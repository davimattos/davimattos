<svg fill="none" xmlns="http://www.w3.org/2000/svg" data-reactroot="">
    <foreignObject width="600px" height="600px">
        <div xmlns="http://www.w3.org/1999/xhtml">
            <style>
                a,
                p {
                    font-size: 16px;
                    font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif, Apple Color Emoji, Segoe UI Emoji;
                    line-height: 1.5;
                    box-sizing: border-box;
                    tab-size: 4 !important;
                    margin: 0;
                    padding: 0;
                }
                a {
                    background-color: initial;
                    outline-width: 0;
                    text-decoration: none;
                }
                .profile {
                    display: flex;
                    width: 590px;
                    height: 590px;

                    flex-direction: column;
                    justify-content: center;
                    margin-left: 5vh;

                }
                .container {
                    margin-left: 2px;
                    border-left: 1px solid black;
                }
                #name {
                    font-size: 5rem;
                    font-weight: 100;

                    margin-bottom: -2rem;
                }
                #lastname {
                    font-size: 5rem;
                    margin-bottom: -1rem;
                }
                #description {
                    font-weight: 100;
                    color: #0366d6;
                    margin-bottom: 2rem;
                }
                .social-media {
                    display: flex;
                    width: 1.5rem;
                    height: 1.5rem;

                    justify-content: center;
                    background-color: #0366d6;
                }

                .social-media, a {
                    font-weight: bold;
                    color: #fff;
                }

            </style>
            <div class="container">
                <div class="profile">
                    <p id="name">
                        DAVI
                    </p>
                    <strong id="lastname">MATTOS</strong>
                    <p id="description">FRONTEND / MOBILE STACK</p>
                    <div class="social-media">
                        <a href="https://www.linkedin.com/in/davimattosdev">
                            in
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </foreignObject>
</svg>
